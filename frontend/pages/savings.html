<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Goals — ExpenseTracker</title>
  <!-- Google Fonts & FontAwesome -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-wrapper">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-placeholder"></div>

      <main class="page-body">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <div>
            <h1 class="page-title">Savings Goals</h1>
            <p class="page-subtitle" style="margin-top:4px;">Define financial targets and track your growth progress.</p>
          </div>
          <button id="add-goal-btn" class="btn-primary" style="padding:10px 20px;border-radius:10px;display:flex;align-items:center;gap:8px;">
            <i class="fas fa-plus"></i>
            <span>New Goal</span>
          </button>
        </div>

        <!-- Metric cards row -->
        <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px;">
          <div class="stat-card" style="border-top: 3px solid var(--color-income);">
            <div class="stat-card-label">Active Savings Targets</div>
            <div class="stat-card-value" id="total-goals-count">0</div>
          </div>
          <div class="stat-card" style="border-top: 3px solid var(--color-savings);">
            <div class="stat-card-label">Accumulated Balance</div>
            <div class="stat-card-value" id="accumulated-savings-sum">$0.00</div>
          </div>
        </div>

        <!-- Goals Grid -->
        <div id="goals-grid" class="categories-grid" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:20px;">
          <!-- Dynamically populated -->
        </div>
      </main>
    </div>
  </div>

  <!-- Savings Goal Modal -->
  <div id="goal-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:450px;">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">New Savings Goal</h3>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body" style="padding-top:16px;">
        <form id="goal-form" onsubmit="return false;">
          <div class="input-shell" style="margin-bottom:14px">
            <label for="goal-title">Goal Name</label>
            <input type="text" id="goal-title" placeholder="e.g. New Laptop, Vacation fund" required>
          </div>
          <div class="input-shell" style="margin-bottom:14px">
            <label for="goal-target">Target Amount ($)</label>
            <input type="number" id="goal-target" min="1" step="any" placeholder="0.00" required>
          </div>
          <div class="input-shell" style="margin-bottom:14px">
            <label for="goal-current">Starting Amount ($)</label>
            <input type="number" id="goal-current" min="0" step="any" value="0" placeholder="0.00">
          </div>
          <div class="input-shell" style="margin-bottom:20px">
            <label for="goal-deadline">Deadline Date</label>
            <input type="date" id="goal-deadline" required>
          </div>
          <div style="display:flex;gap:12px;justify-content:flex-end">
            <button type="button" id="cancel-goal-btn" class="btn-ghost">Cancel</button>
            <button type="button" id="save-goal-btn" class="btn-primary">Save Goal</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Add Funds Modal -->
  <div id="funds-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:400px;">
      <div class="modal-header">
        <h3 class="modal-title">Add Goal Savings</h3>
        <button id="close-funds-modal-btn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body" style="padding-top:16px;">
        <form id="funds-form" onsubmit="return false;">
          <div class="input-shell" style="margin-bottom:20px">
            <label for="funds-amount">Amount to Deposit ($)</label>
            <input type="number" id="funds-amount" min="1" step="any" placeholder="0.00" required>
          </div>
          <div style="display:flex;gap:12px;justify-content:flex-end">
            <button type="button" id="cancel-funds-btn" class="btn-ghost">Cancel</button>
            <button type="button" id="save-funds-btn" class="btn-primary">Deposit</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="/js/savings.js"></script>
</body>
</html>
