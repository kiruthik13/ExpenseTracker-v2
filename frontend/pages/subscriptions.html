<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscriptions & Bills — ExpenseTracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231A4731'/%3E%3Ctext y='.9em' font-size='70' x='15'%3E₹%3C/text%3E%3C/svg%3E" />
  <!-- Google Fonts & FontAwesome -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-wrapper">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-placeholder"></div>

      <main class="page-body">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <div>
            <h1 class="page-title">Subscriptions & Bills</h1>
            <p class="page-subtitle" style="margin-top:4px;">Manage recurring payments and track upcoming utility bill deadlines.</p>
          </div>
          <div style="display:flex;gap:10px;">
            <button id="add-sub-btn" class="btn-ghost" style="padding:10px 18px;border-radius:10px;display:flex;align-items:center;gap:8px;">
              <i class="fas fa-plus"></i>
              <span>New Subscription</span>
            </button>
            <button id="add-bill-btn" class="btn-primary" style="padding:10px 18px;border-radius:10px;display:flex;align-items:center;gap:8px;">
              <i class="fas fa-plus"></i>
              <span>New Bill Reminder</span>
            </button>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:flex-start;" class="layout-grid-two">
          <!-- Left Column: Subscriptions -->
          <div>
            <h3 style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:16px;color:var(--color-text-primary);">Subscriptions</h3>
            <div id="subs-list" style="display:flex;flex-direction:column;gap:12px;">
              <!-- Dynamically populated -->
            </div>
          </div>

          <!-- Right Column: Bill Reminders -->
          <div>
            <h3 style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:16px;color:var(--color-text-primary);">Upcoming Bills</h3>
            <div id="bills-list" style="display:flex;flex-direction:column;gap:12px;">
              <!-- Dynamically populated -->
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Subscription Modal -->
  <div id="sub-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:420px;">
      <div class="modal-header">
        <h3 class="modal-title" id="sub-modal-title">New Subscription</h3>
        <button id="close-sub-modal-btn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body" style="padding-top:16px;">
        <form id="sub-form" onsubmit="return false;">
          <div class="input-shell" style="margin-bottom:14px">
            <label for="sub-name">Subscription Name</label>
            <input type="text" id="sub-name" placeholder="e.g. Netflix, Spotify, AWS" required>
          </div>
          <div class="input-shell" style="margin-bottom:14px">
            <label for="sub-amount">Monthly Cost (₹)</label>
            <input type="number" id="sub-amount" min="0.01" step="any" placeholder="0.00" required>
          </div>
          <div class="input-shell" style="margin-bottom:14px">
            <label for="sub-cycle">Billing Cycle</label>
            <select id="sub-cycle" required>
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
          <div class="input-shell" style="margin-bottom:20px">
            <label for="sub-date">Next Renewal Date</label>
            <input type="date" id="sub-date" required>
          </div>
          <div style="display:flex;gap:12px;justify-content:flex-end">
            <button type="button" id="cancel-sub-btn" class="btn-ghost">Cancel</button>
            <button type="button" id="save-sub-btn" class="btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Bill Reminder Modal -->
  <div id="bill-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:420px;">
      <div class="modal-header">
        <h3 class="modal-title" id="bill-modal-title">New Bill Reminder</h3>
        <button id="close-bill-modal-btn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body" style="padding-top:16px;">
        <form id="bill-form" onsubmit="return false;">
          <div class="input-shell" style="margin-bottom:14px">
            <label for="bill-title">Bill Title</label>
            <input type="text" id="bill-title" placeholder="e.g. Electricity Bill, House Rent" required>
          </div>
          <div class="input-shell" style="margin-bottom:14px">
            <label for="bill-amount">Due Amount (₹)</label>
            <input type="number" id="bill-amount" min="0.01" step="any" placeholder="0.00" required>
          </div>
          <div class="input-shell" style="margin-bottom:14px">
            <label for="bill-cat">Bill Category</label>
            <input type="text" id="bill-cat" placeholder="e.g. Utilities, Housing, Insurance" value="Utilities">
          </div>
          <div class="input-shell" style="margin-bottom:20px">
            <label for="bill-date">Due Date</label>
            <input type="date" id="bill-date" required>
          </div>
          <div style="display:flex;gap:12px;justify-content:flex-end">
            <button type="button" id="cancel-bill-btn" class="btn-ghost">Cancel</button>
            <button type="button" id="save-bill-btn" class="btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="/js/subscriptions.js"></script>
</body>
</html>
