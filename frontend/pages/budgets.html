<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budgets — ExpenseTracker</title>
  <meta name="description" content="Set and track monthly budgets for each spending category with real-time progress bars." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231A4731'/%3E%3Ctext y='.9em' font-size='70' x='15'%3E₹%3C/text%3E%3C/svg%3E" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <div id="sidebar-placeholder"></div>
    <div class="main-content">
      <div id="navbar-placeholder"></div>

      <div class="page-header">
        <div>
          <h1 class="page-title"><i class="fas fa-wallet" style="color:var(--color-primary);margin-right:10px"></i>Budgets</h1>
          <p class="page-subtitle">Track spending against monthly budget limits · <span id="budget-count">0</span> budgets</p>
        </div>
        <button id="add-budget-btn" class="btn-primary-custom"><i class="fas fa-plus"></i> New Budget</button>
      </div>

      <!-- Period Filter -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-body" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding: 16px;">
          <div style="display:flex;align-items:center;gap:10px">
            <label class="form-label-custom" style="margin:0">Month:</label>
            <div class="input-shell" style="padding: 6px 10px;">
              <select id="budget-month" style="width:130px;font-size:13px;">
                <option value="1">January</option><option value="2">February</option>
                <option value="3">March</option><option value="4">April</option>
                <option value="5">May</option><option value="6">June</option>
                <option value="7">July</option><option value="8">August</option>
                <option value="9">September</option><option value="10">October</option>
                <option value="11">November</option><option value="12">December</option>
              </select>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <label class="form-label-custom" style="margin:0">Year:</label>
            <div class="input-shell" style="padding: 6px 10px;">
              <select id="budget-year" style="width:100px;font-size:13px;"></select>
            </div>
          </div>
          <button id="apply-month-btn" class="btn-primary-custom" style="padding:10px 18px"><i class="fas fa-sync"></i> Refresh</button>

          <!-- Summary -->
          <div style="margin-left:auto;display:flex;gap:20px;text-align:right;flex-wrap:wrap">
            <div><div style="font-size:10px;color:var(--color-text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.05em">Total Budget</div><div style="font-size:18px;font-weight:800;color:var(--color-text-primary);" id="total-budget">—</div></div>
            <div><div style="font-size:10px;color:var(--color-text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.05em">Total Spent</div><div style="font-size:18px;font-weight:800;color:var(--color-expense)" id="total-spent">—</div></div>
            <div><div style="font-size:10px;color:var(--color-text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.05em">Remaining</div><div style="font-size:18px;font-weight:800;color:var(--color-income)" id="total-remaining">—</div></div>
          </div>
        </div>
      </div>

      <!-- Budgets Grid -->
      <div id="budgets-grid" class="budgets-grid">
        <div class="skeleton" style="height:140px;border-radius:12px"></div>
        <div class="skeleton" style="height:140px;border-radius:12px"></div>
        <div class="skeleton" style="height:140px;border-radius:12px"></div>
      </div>
    </div>
  </div>

  <!-- Budget Modal -->
  <div id="budget-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">New Budget</h2>
        <button id="close-modal-btn" class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="budget-form">
          <div>
            <label class="form-label-custom">Category *</label>
            <div class="input-shell">
              <select id="budget-category">
                <option value="">Select category</option>
              </select>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px">
            <div>
              <label class="form-label-custom">Month *</label>
              <div class="input-shell">
                <select id="budget-month-input">
                  <option value="1">January</option><option value="2">February</option>
                  <option value="3">March</option><option value="4">April</option>
                  <option value="5">May</option><option value="6">June</option>
                  <option value="7">July</option><option value="8">August</option>
                  <option value="9">September</option><option value="10">October</option>
                  <option value="11">November</option><option value="12">December</option>
                </select>
              </div>
            </div>
            <div>
              <label class="form-label-custom">Year *</label>
              <div class="input-shell">
                <input type="number" id="budget-year-input" min="2020" max="2030" />
              </div>
            </div>
          </div>

          <div style="margin-top:14px">
            <label class="form-label-custom">Budget Amount *</label>
            <div class="input-shell">
              <input type="number" id="budget-amount" placeholder="0.00" min="1" step="0.01" required />
            </div>
          </div>

          <div style="margin-top:14px">
            <label class="form-label-custom">Alert Threshold (%)</label>
            <input type="range" id="budget-alert" min="10" max="100" step="5" value="80" oninput="document.getElementById('alert-value').textContent=this.value+'%'" style="width:100%;accent-color:var(--color-accent);" />
            <div style="text-align:right;font-size:13px;color:var(--color-savings);font-weight:600"><span id="alert-value">80%</span></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="cancel-budget-btn" class="btn-ghost">Cancel</button>
        <button id="save-budget-btn" class="btn-primary-custom"><i class="fas fa-save"></i> Save Budget</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/budget.js"></script>
</body>
</html>
