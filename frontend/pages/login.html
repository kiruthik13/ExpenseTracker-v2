<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ExpenseTracker</title>
  <meta name="description" content="Sign in to your ExpenseTracker account to manage your personal finances." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231A4731'/%3E%3Ctext y='.9em' font-size='70' x='15'%3E₹%3C/text%3E%3C/svg%3E" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div id="toast-container"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <!-- Brand Row (matching sidebar brand) -->
      <a href="#" class="sidebar-brand" style="margin-bottom: 28px; padding: 0; border-bottom: none; display: flex; align-items: center; justify-content: flex-start;">
        <div class="sidebar-brand-icon">₹</div>
        <div class="sidebar-brand-info">
          <span class="sidebar-brand-text">ExpenseTracker</span>
          <span class="sidebar-brand-tagline">Smart Personal Finance</span>
        </div>
      </a>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <form id="login-form" novalidate>
        <!-- Email -->
        <div class="input-group-custom">
          <label class="form-label-custom">Email Address</label>
          <div class="input-shell">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
        </div>

        <!-- Password -->
        <div class="input-group-custom">
          <label class="form-label-custom">Password</label>
          <div class="input-shell">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
            <button type="button" class="toggle-password" style="background:none;border:none;padding:0;cursor:pointer;"><i class="fas fa-eye" style="color:#B0B8A8"></i></button>
          </div>
        </div>

        <!-- Between Row -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#8A9280;cursor:pointer">
            <input type="checkbox" id="remember-me" style="width:15px;height:15px;accent-color:#1A4731;border:1.5px solid #E4E8E0;border-radius:4px" /> Remember me
          </label>
          <a href="#" id="forgot-password-link" style="font-size:12px;color:#1A4731;font-weight:600;text-decoration:none;">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" id="login-submit" class="btn-auth-submit">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="divider">or</div>

      <p style="text-align:center;font-size:13px;color:#8A9280;margin:0">
        Don't have an account?
        <a href="/pages/register.html" style="font-weight:700;color:#1A4731;text-decoration:none;">Create one free</a>
      </p>
    </div>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
