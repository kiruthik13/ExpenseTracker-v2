<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories — ExpenseTracker</title>
  <meta name="description" content="Manage your expense and income categories with icons, colors, and budget limits." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231A4731'/%3E%3Ctext y='.9em' font-size='70' x='15'%3E₹%3C/text%3E%3C/svg%3E" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <div id="sidebar-placeholder"></div>
    <div class="main-content">
      <div id="navbar-placeholder"></div>

      <div class="page-header">
        <div>
          <h1 class="page-title"><i class="fas fa-tags" style="color:var(--color-primary);margin-right:10px"></i>Categories</h1>
          <p class="page-subtitle">Organize your finances with custom categories · <span id="category-count">0</span> total</p>
        </div>
        <button id="add-cat-btn" class="btn-primary-custom"><i class="fas fa-plus"></i> New Category</button>
      </div>

      <div id="categories-grid" class="categories-grid">
        <!-- Skeleton placeholders -->
        <div class="skeleton" style="height:80px;border-radius:12px"></div>
        <div class="skeleton" style="height:80px;border-radius:12px"></div>
        <div class="skeleton" style="height:80px;border-radius:12px"></div>
        <div class="skeleton" style="height:80px;border-radius:12px"></div>
      </div>
    </div>
  </div>

  <!-- Category Modal -->
  <div id="category-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">New Category</h2>
        <button id="close-modal-btn" class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="category-form">
          <!-- Preview -->
          <div style="display:flex;justify-content:center;margin-bottom:20px">
            <div id="icon-preview" style="width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;background:rgba(26, 71, 49, 0.1);color:#1A4731;transition:all 0.3s"></div>
          </div>

          <div>
            <label class="form-label-custom">Category Name *</label>
            <div class="input-shell">
              <input type="text" id="cat-name" placeholder="e.g. Food & Dining" required />
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px">
            <div>
              <label class="form-label-custom">Type</label>
              <div class="input-shell">
                <select id="cat-type">
                  <option value="expense">💸 Expense</option>
                  <option value="income">💰 Income</option>
                  <option value="both">↔ Both</option>
                </select>
              </div>
            </div>
            <div>
              <label class="form-label-custom">Budget Limit ($)</label>
              <div class="input-shell">
                <input type="number" id="cat-budget" placeholder="0 = no limit" min="0" value="0" />
              </div>
            </div>
          </div>

          <!-- Icon Picker -->
          <div style="margin-top:16px">
            <label class="form-label-custom">Icon</label>
            <div id="icon-picker" class="icon-picker-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; max-height: 120px; overflow-y: auto; padding: 4px; border: 1px solid var(--color-border); border-radius: 8px;"></div>
          </div>

          <!-- Color Picker -->
          <div style="margin-top:16px">
            <label class="form-label-custom">Color <span id="color-preview" style="display:inline-block;width:14px;height:14px;border-radius:50%;vertical-align:middle;margin-left:6px"></span></label>
            <div id="color-picker" class="color-picker-grid" style="display: flex; flex-wrap: wrap; gap: 8px; padding: 4px;"></div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="cancel-cat-btn" class="btn-ghost">Cancel</button>
        <button id="save-cat-btn" class="btn-primary-custom"><i class="fas fa-save"></i> Save Category</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/category.js"></script>
</body>
</html>
