<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenses — ExpenseTracker</title>
  <meta name="description" content="Manage your expenses — add, edit, delete, search, filter, and export transactions." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231A4731'/%3E%3Ctext y='.9em' font-size='70' x='15'%3E₹%3C/text%3E%3C/svg%3E" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <div id="sidebar-placeholder"></div>
    <div class="main-content">
      <div id="navbar-placeholder"></div>

      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1 class="page-title"><i class="fas fa-receipt" style="color:var(--color-primary);margin-right:10px"></i>Expenses</h1>
          <p class="page-subtitle">Manage all your income and expenses · <span id="total-count">0</span> transactions</p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button id="export-csv-btn" class="btn-ghost"><i class="fas fa-file-csv"></i> CSV</button>
          <button id="export-pdf-btn" class="btn-ghost"><i class="fas fa-file-pdf"></i> PDF</button>
          <button id="add-expense-btn" class="btn-primary-custom"><i class="fas fa-plus"></i> Add expense</button>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="input-group-custom" style="margin-bottom:16px">
        <div class="input-shell">
          <i class="fas fa-search"></i>
          <input type="text" id="expense-search" placeholder="Search by description or tag..." />
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-bar">
        <div class="filter-group">
          <label>Type</label>
          <div class="input-shell" style="padding: 6px 10px;">
            <select id="filter-type" style="font-size: 13px;">
              <option value="">All Types</option>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
        </div>
        <div class="filter-group">
          <label>Category</label>
          <div class="input-shell" style="padding: 6px 10px;">
            <select id="filter-category" style="font-size: 13px;">
              <option value="">All Categories</option>
            </select>
          </div>
        </div>
        <div class="filter-group">
          <label>From Date</label>
          <div class="input-shell" style="padding: 6px 10px;">
            <input type="date" id="filter-start-date" style="font-size: 13px;" />
          </div>
        </div>
        <div class="filter-group">
          <label>To Date</label>
          <div class="input-shell" style="padding: 6px 10px;">
            <input type="date" id="filter-end-date" style="font-size: 13px;" />
          </div>
        </div>
        <div class="filter-group">
          <label>Min Amount</label>
          <div class="input-shell" style="padding: 6px 10px;">
            <input type="number" id="filter-min-amount" placeholder="0" style="font-size: 13px;" />
          </div>
        </div>
        <div class="filter-group">
          <label>Max Amount</label>
          <div class="input-shell" style="padding: 6px 10px;">
            <input type="number" id="filter-max-amount" placeholder="∞" style="font-size: 13px;" />
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <button id="apply-filters-btn" class="btn-primary-custom" style="padding:10px 16px"><i class="fas fa-filter"></i> Apply</button>
          <button id="clear-filters-btn" class="btn-ghost" style="padding:10px 16px"><i class="fas fa-times"></i> Clear</button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table class="table-custom">
          <thead>
            <tr>
              <th>Description</th>
              <th>Type</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Date</th>
              <th>Payment</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="expenses-tbody">
            <tr><td colspan="7" style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto"></div></td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination-container" class="pagination-custom"></div>
    </div>
  </div>

  <!-- Add/Edit Expense Modal -->
  <div id="expense-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">Add Expense</h2>
        <button id="close-modal-btn" class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="expense-form">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <!-- Amount -->
            <div>
              <label class="form-label-custom">Amount *</label>
              <div class="input-shell">
                <input type="number" id="input-amount" placeholder="0.00" step="0.01" min="0.01" required />
              </div>
            </div>
            <!-- Type -->
            <div>
              <label class="form-label-custom">Type *</label>
              <div class="input-shell">
                <select id="select-type">
                  <option value="expense">💸 Expense</option>
                  <option value="income">💰 Income</option>
                </select>
              </div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px">
            <!-- Category -->
            <div>
              <label class="form-label-custom">Category *</label>
              <div class="input-shell">
                <select id="select-category">
                  <option value="">Select category</option>
                </select>
              </div>
            </div>
            <!-- Date -->
            <div>
              <label class="form-label-custom">Date *</label>
              <div class="input-shell">
                <input type="date" id="input-date" required />
              </div>
            </div>
          </div>

          <div style="margin-top:14px">
            <label class="form-label-custom">Payment Method</label>
            <div class="input-shell">
              <select id="select-payment">
                <option value="">No payment method</option>
              </select>
            </div>
          </div>

          <div style="margin-top:14px">
            <label class="form-label-custom">Description</label>
            <div class="input-shell">
              <input type="text" id="input-description" placeholder="What was this for?" maxlength="200" />
            </div>
          </div>

          <!-- Tags -->
          <div style="margin-top:14px">
            <label class="form-label-custom">Tags (press Enter to add)</label>
            <div class="input-shell">
              <input type="text" id="tag-input" placeholder="e.g. groceries, dinner..." />
            </div>
            <div id="tags-container" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
          </div>

          <!-- Receipt -->
          <div style="margin-top:14px">
            <label class="form-label-custom">Receipt Image</label>
            <div class="drop-zone" onclick="document.getElementById('receipt-input').click()" style="border: 1px dashed var(--color-border); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; background: #F9FAF8;">
              <i class="fas fa-cloud-upload-alt" style="font-size: 24px; color: var(--color-text-muted); margin-bottom: 8px;"></i>
              <p style="font-size: 12px; color: var(--color-text-secondary); margin: 0;">Click to upload receipt (JPG, PNG)</p>
            </div>
            <input type="file" id="receipt-input" accept="image/*" style="display:none" />
            <img id="receipt-preview" style="display:none;width:80px;height:80px;object-fit:cover;border-radius:8px;margin-top:8px;border:1px solid var(--color-border)" alt="Receipt preview" />
          </div>

          <!-- Recurring -->
          <div style="margin-top:14px">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--color-text-secondary)">
              <input type="checkbox" id="input-recurring" style="accent-color:var(--color-accent)">
              <span>Recurring expense</span>
            </label>
            <div id="recurring-type-wrapper" style="display:none;margin-top:10px">
              <div class="input-shell">
                <select id="select-recurring-type">
                  <option value="daily">Daily</option>
                  <option value="weekly">Weekly</option>
                  <option value="monthly">Monthly</option>
                  <option value="yearly">Yearly</option>
                </select>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="cancel-expense-btn" class="btn-ghost">Cancel</button>
        <button id="save-expense-btn" class="btn-primary-custom"><i class="fas fa-save"></i> Add Expense</button>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab-add-btn" title="Add Expense">
    <i class="fas fa-plus"></i>
  </button>

  <script type="module" src="/js/expense.js"></script>
</body>
</html>
