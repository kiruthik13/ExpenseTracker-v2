<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ExpenseTracker</title>
  <meta name="description" content="Create your free ExpenseTracker account and start managing your personal finances." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231A4731'/%3E%3Ctext y='.9em' font-size='70' x='15'%3E₹%3C/text%3E%3C/svg%3E" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div id="toast-container"></div>

  <div class="auth-wrapper">
    <div class="auth-card" style="max-width:480px">
      <!-- Brand Row (matching sidebar brand) -->
      <a href="#" class="sidebar-brand" style="margin-bottom: 28px; padding: 0; border-bottom: none; display: flex; align-items: center; justify-content: flex-start;">
        <div class="sidebar-brand-icon">₹</div>
        <div class="sidebar-brand-info">
          <span class="sidebar-brand-text">ExpenseTracker</span>
          <span class="sidebar-brand-tagline">Smart Personal Finance</span>
        </div>
      </a>

      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Start tracking your expenses today — it's free!</p>

      <form id="register-form" novalidate>
        <!-- Full Name -->
        <div class="input-group-custom">
          <label class="form-label-custom">Full Name</label>
          <div class="input-shell">
            <i class="fas fa-user"></i>
            <input type="text" id="fullName" placeholder="John Doe" required />
          </div>
        </div>

        <!-- Email -->
        <div class="input-group-custom">
          <label class="form-label-custom">Email Address</label>
          <div class="input-shell">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
        </div>

        <!-- Currency -->
        <div class="input-group-custom">
          <label class="form-label-custom">Default Currency</label>
          <div class="input-shell">
            <i class="fas fa-rupee-sign"></i>
            <select id="currency" disabled>
              <option value="INR" selected>🇮🇳 INR — Indian Rupee</option>
            </select>
          </div>
        </div>

        <!-- Password -->
        <div class="input-group-custom">
          <label class="form-label-custom">Password</label>
          <div class="input-shell">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="At least 6 characters" required autocomplete="new-password" />
            <button type="button" class="toggle-password" style="background:none;border:none;padding:0;cursor:pointer;"><i class="fas fa-eye" style="color:#B0B8A8"></i></button>
          </div>
          <div class="password-strength" style="margin-top: 8px;"><div id="strength-bar" class="password-strength-bar" style="width:0"></div></div>
          <div style="display:flex;justify-content:flex-end;margin-top:4px"><span id="strength-text" style="font-size:11px;color:#8A9280"></span></div>
        </div>

        <!-- Confirm Password -->
        <div class="input-group-custom">
          <label class="form-label-custom">Confirm Password</label>
          <div class="input-shell">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirm-password" placeholder="Repeat password" required autocomplete="new-password" />
            <button type="button" class="toggle-password" style="background:none;border:none;padding:0;cursor:pointer;"><i class="fas fa-eye" style="color:#B0B8A8"></i></button>
          </div>
        </div>

        <!-- Terms -->
        <label style="display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#5A6354;margin-bottom:20px;cursor:pointer">
          <input type="checkbox" id="terms-check" style="accent-color:#1A4731;margin-top:2px;border:1.5px solid #E4E8E0" required />
          <span>I agree to the <a href="#" style="color:#1A4731;text-decoration:none;font-weight:600">Terms of Service</a> and <a href="#" style="color:#1A4731;text-decoration:none;font-weight:600">Privacy Policy</a></span>
        </label>

        <!-- Submit -->
        <button type="submit" class="btn-auth-submit">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="divider">or</div>

      <p style="text-align:center;font-size:13px;color:#8A9280;margin:0">
        Already have an account? <a href="/pages/login.html" style="font-weight:700;color:#1A4731;text-decoration:none;">Sign in</a>
      </p>
    </div>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
