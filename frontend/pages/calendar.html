<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Calendar — ExpenseTracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231A4731'/%3E%3Ctext y='.9em' font-size='70' x='15'%3E₹%3C/text%3E%3C/svg%3E" />
  <!-- Google Fonts & FontAwesome -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-wrapper">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-placeholder"></div>

      <main class="page-body">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <div>
            <h1 class="page-title">Expense Calendar</h1>
            <p class="page-subtitle" style="margin-top:4px;">Analyze daily transaction logs and summaries at a glance.</p>
          </div>
          <div style="display:flex;align-items:center;gap:12px;background:#fff;padding:6px 12px;border:1px solid var(--color-border);border-radius:10px;">
            <button id="prev-month-btn" class="navbar-btn" style="padding:6px 10px"><i class="fas fa-chevron-left"></i></button>
            <span id="current-month-year" style="font-weight:700;font-size:16px;color:var(--color-text-primary);min-width:140px;text-align:center;">Loading...</span>
            <button id="next-month-btn" class="navbar-btn" style="padding:6px 10px"><i class="fas fa-chevron-right"></i></button>
          </div>
        </div>

        <!-- Calendar Container -->
        <div class="card animate-fadeInUp" style="padding:24px;">
          <div class="calendar-grid-header" style="display:grid;grid-template-columns:repeat(7, 1fr);text-align:center;font-weight:700;color:var(--color-text-secondary);border-bottom:1px solid var(--color-border);padding-bottom:10px;margin-bottom:10px;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div id="calendar-days" class="calendar-grid">
            <!-- Rendered dynamically -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Day Transactions Modal -->
  <div id="calendar-day-modal" class="modal-overlay" style="display:none;">
    <div class="modal-box" style="max-width:550px;width:95%;">
      <div class="modal-header">
        <h3 class="modal-title" id="day-modal-title">Transactions</h3>
        <button id="close-day-modal-btn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body" style="padding-top:16px;">
        <div id="day-txns-list" style="display:flex;flex-direction:column;gap:10px;max-height:350px;overflow-y:auto;">
          <!-- Dynamically populated -->
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="/js/calendar.js"></script>
</body>
</html>
