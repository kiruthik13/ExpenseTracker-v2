<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — ExpenseTracker</title>
  <meta name="description" content="Manage your ExpenseTracker profile, update personal information, and change your password." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%231A4731'/%3E%3Ctext y='.9em' font-size='70' x='15'%3E₹%3C/text%3E%3C/svg%3E" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div id="toast-container"></div>
  <div class="app-wrapper">
    <div id="sidebar-placeholder"></div>
    <div class="main-content">
      <div id="navbar-placeholder"></div>

      <div class="page-header">
        <div>
          <h1 class="page-title"><i class="fas fa-user-circle" style="color:var(--color-primary);margin-right:10px"></i>Profile</h1>
          <p class="page-subtitle">Manage your personal information and preferences</p>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <!-- Profile Card -->
        <div class="card animate-fadeInUp">
          <div class="card-header"><h2 class="card-title">Personal Information</h2></div>
          <div class="card-body" style="padding: 0;">
            <!-- Avatar -->
            <div class="profile-pic-wrap" id="avatar-upload-wrap" title="Click to change avatar" style="cursor:pointer; position: relative; width: 100px; height: 100px; margin: 0 auto 20px;">
              <img id="profile-avatar" class="profile-pic" src="" alt="Avatar" style="display:none; width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--color-accent);" />
              <div id="profile-avatar-placeholder" class="sidebar-user-avatar-placeholder" style="width:100px;height:100px;font-size:36px;border:3px solid var(--color-accent)">U</div>
              <div class="profile-pic-edit" style="position: absolute; bottom: 0; right: 0; width: 30px; height: 30px; background: var(--color-accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; border: 2px solid #fff;"><i class="fas fa-camera"></i></div>
            </div>
            <input type="file" id="avatar-file-input" accept="image/*" style="display:none" />

            <div style="margin-top:8px">
              <div>
                <label class="form-label-custom">Full Name</label>
                <div class="input-shell">
                  <input type="text" id="profile-fullName" placeholder="Your full name" />
                </div>
              </div>
              <div style="margin-top:12px">
                <label class="form-label-custom">Email Address</label>
                <div class="input-shell" style="opacity:0.6">
                  <input type="email" id="profile-email" placeholder="your@email.com" disabled />
                </div>
                <p style="font-size:11px;color:var(--color-text-muted);margin-top:4px">Email cannot be changed</p>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">
                <div>
                  <label class="form-label-custom">Currency</label>
                  <div class="input-shell">
                    <select id="profile-currency" disabled>
                      <option value="INR" selected>INR 🇮🇳</option>
                    </select>
                  </div>
                </div>
                <div>
                  <label class="form-label-custom">Monthly Income</label>
                  <div class="input-shell">
                    <input type="number" id="profile-monthlyIncome" placeholder="0.00" min="0" />
                  </div>
                </div>
              </div>
              <div style="margin-top:12px">
                <label class="form-label-custom">Timezone</label>
                <div class="input-shell">
                  <select id="profile-timezone">
                    <option value="UTC">UTC</option>
                    <option value="America/New_York">America/New_York (EST)</option>
                    <option value="America/Los_Angeles">America/Los_Angeles (PST)</option>
                    <option value="Europe/London">Europe/London (GMT)</option>
                    <option value="Europe/Paris">Europe/Paris (CET)</option>
                    <option value="Asia/Kolkata">Asia/Kolkata (IST)</option>
                    <option value="Asia/Tokyo">Asia/Tokyo (JST)</option>
                    <option value="Australia/Sydney">Australia/Sydney (AEST)</option>
                  </select>
                </div>
              </div>
              <div style="margin-top:20px">
                <button id="save-profile-btn" class="btn-primary-custom" style="width:100%;justify-content:center">
                  <i class="fas fa-save"></i> Save Profile
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Change Password Card -->
        <div class="card animate-fadeInUp animate-delay-100">
          <div class="card-header"><h2 class="card-title">Change Password</h2></div>
          <div class="card-body" style="padding: 0;">
            <form id="password-form">
              <div class="input-group-custom">
                <label class="form-label-custom">Current Password</label>
                <div class="input-shell">
                  <i class="fas fa-lock"></i>
                  <input type="password" id="current-password" placeholder="Enter current password" />
                  <button type="button" class="toggle-password" style="background:none;border:none;padding:0;cursor:pointer;"><i class="fas fa-eye" style="color:#B0B8A8"></i></button>
                </div>
              </div>
              <div class="input-group-custom" style="margin-top:14px">
                <label class="form-label-custom">New Password</label>
                <div class="input-shell">
                  <i class="fas fa-lock"></i>
                  <input type="password" id="new-password" placeholder="At least 6 characters" />
                  <button type="button" class="toggle-password" style="background:none;border:none;padding:0;cursor:pointer;"><i class="fas fa-eye" style="color:#B0B8A8"></i></button>
                </div>
              </div>
              <div class="input-group-custom" style="margin-top:14px">
                <label class="form-label-custom">Confirm New Password</label>
                <div class="input-shell">
                  <i class="fas fa-lock"></i>
                  <input type="password" id="confirm-new-password" placeholder="Repeat new password" />
                  <button type="button" class="toggle-password" style="background:none;border:none;padding:0;cursor:pointer;"><i class="fas fa-eye" style="color:#B0B8A8"></i></button>
                </div>
              </div>
              <div style="margin-top:20px">
                <button type="button" id="change-pw-btn" class="btn-primary-custom" style="width:100%;justify-content:center">
                  <i class="fas fa-key"></i> Change Password
                </button>
              </div>
            </form>

            <!-- Danger Zone -->
            <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--color-border)">
              <h3 style="font-size:12px;font-weight:700;color:var(--color-expense);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em">⚠ Danger Zone</h3>
              <button id="logout-btn" class="btn-danger" style="width:100%;padding:10px;border-radius:8px">
                <i class="fas fa-sign-out-alt"></i> Sign Out of All Devices
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Achievements and Badges -->
      <div class="card animate-fadeInUp animate-delay-200" style="margin-top:20px;">
        <div class="card-header"><h2 class="card-title">Achievements & Badges</h2></div>
        <div class="card-body">
          <div id="badges-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;">
            <!-- Dynamically populated -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/profile.js"></script>
</body>
</html>
