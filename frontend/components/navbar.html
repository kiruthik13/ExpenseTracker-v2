<!-- Navbar Component -->
<header class="navbar-custom">
  <!-- Search -->
  <div class="navbar-search-pill">
    <i class="fas fa-search"></i>
    <input type="text" placeholder="Search expenses..." id="navbar-search-input">
  </div>

  <!-- Actions -->
  <div class="navbar-actions">
    <div style="position:relative;">
      <button class="navbar-btn-circle" title="Notifications" id="notification-bell-btn">
        <i class="fas fa-bell"></i>
        <span id="notification-badge" class="badge bg-danger rounded-pill" style="position:absolute;top:-4px;right:-4px;font-size:9px;padding:3px 6px;display:none;">0</span>
      </button>
      
      <!-- Notifications Dropdown Box -->
      <div id="notification-dropdown" style="display:none;position:absolute;top:45px;right:0;width:320px;background:#FFFFFF;border:1px solid var(--color-border);border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.05);z-index:999;padding:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--color-border);">
          <span style="font-weight:700;font-size:14px;color:var(--color-text-primary);">System Alerts</span>
          <button id="mark-all-read-btn" style="background:none;border:none;color:var(--color-accent);font-size:11px;font-weight:600;cursor:pointer;">Mark all read</button>
        </div>
        <div id="notifications-dropdown-list" style="max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;">
          <div style="text-align:center;padding:12px;font-size:12px;color:var(--color-text-muted);">No new notifications</div>
        </div>
      </div>
    </div>
    <a href="/pages/settings.html" class="navbar-btn-circle" title="Settings">
      <i class="fas fa-cog"></i>
    </a>
    <a href="/pages/profile.html" class="navbar-btn-circle" title="Profile">
      <i class="fas fa-user"></i>
    </a>
  </div>
</header>
