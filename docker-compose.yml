version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: expense-tracker-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
      - MONGO_INITDB_DATABASE=expense_tracker
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: expense-tracker-backend
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://root:root@mongodb:27017/expense_tracker?authSource=admin
    volumes:
      - ./backend/src:/app/src
    restart: always

  frontend:
    image: node:20-alpine
    container_name: expense-tracker-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install -g serve && serve -s . -l 3000"
    restart: always

volumes:
  mongo_data:
